<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MC* - Markdown Copy — Settings</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #111;
        padding: 40px 20px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0f0f0;
        }
        .card {
          background: #2a2a2a;
          border-color: #3a3a3a;
        }
        input {
          background: #333;
          border-color: #444;
          color: #f0f0f0;
        }
        input::placeholder {
          color: #888;
        }
        .remove-btn {
          color: #ff6b6b;
        }
        .remove-btn:hover {
          background: #3a2020;
        }
      }

      .container {
        max-width: 560px;
        margin: 0 auto;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 24px;
      }

      .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        padding: 24px;
      }

      .card h2 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #000;
      }
      .card p {
        font-size: 13px;
        color: #666;
        margin-bottom: 16px;
      }

      @media (prefers-color-scheme: dark) {
        .card p {
          color: #aaa;
        }
      }

      .pattern-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .pattern-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type="text"] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        font-family: monospace;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #888;
      }

      .remove-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: #c00;
        padding: 4px 8px;
        border-radius: 6px;
        line-height: 1;
      }

      .remove-btn:hover {
        background: #fdecea;
      }

      .add-btn {
        background: none;
        border: 1px dashed #aaa;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
        color: #555;
        width: 100%;
        text-align: center;
        margin-bottom: 20px;
      }

      .add-btn:hover {
        border-color: #555;
        color: #111;
      }

      @media (prefers-color-scheme: dark) {
        .add-btn {
          color: #aaa;
          border-color: #555;
        }
        .add-btn:hover {
          border-color: #aaa;
          color: #f0f0f0;
        }
      }

      .save-btn {
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
      }

      .save-btn:hover {
        background: #333;
      }

      @media (prefers-color-scheme: dark) {
        .save-btn {
          background: #f0f0f0;
          color: #111;
        }
        .save-btn:hover {
          background: #ccc;
        }
      }

      .status {
        text-align: center;
        font-size: 13px;
        color: #888;
        margin-top: 12px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MC* - Markdown Copy — Settings</h1>
      <div class="card">
        <h2>Title Cleanup</h2>
        <p>
          Enter text to strip from the page title before copying. Matching is
          case-insensitive.
        </p>
        <div class="pattern-list" id="patternList"></div>
        <button class="add-btn" id="addBtn">+ Add pattern</button>
        <button class="save-btn" id="saveBtn">Save</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
