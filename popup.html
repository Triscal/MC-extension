<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 260px;
        padding: 16px;
        background: #fff;
        color: #111;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0f0f0;
        }
        .error-box {
          background: #3a1a1a;
          border-color: #7a2a2a;
        }
        .no-error {
          color: #aaa;
        }
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .error-box {
        background: #fdecea;
        border: 1px solid #f5c2c2;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        color: #c00;
        line-height: 1.4;
      }
      .no-error {
        font-size: 13px;
        color: #888;
      }
      .main-button {
        margin-top: 12px;
        margin-bottom: 12px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #42f5d1;
        font-size: 13px;
        cursor: pointer;
      }
      #content {
        padding-top: 10px;
        padding-bottom: 10px;
      }
      .main-button:hover {
        background: #289982;
      }
      @media (prefers-color-scheme: dark) {
        .main-button {
          background: #144d41;
          color: #f0f0f0;
        }
        .main-button:hover {
          background: #09241e;
        }
      }
      .secondary-button {
        margin-top: 12px;
        margin-bottom: 12px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #eee;
        font-size: 13px;
        cursor: pointer;
      }
      .secondary-button:hover {
        background: #ddd; 
      }
      @media (prefers-color-scheme: dark) {
        .secondary-button {
          background: #333;
          color: #f0f0f0;
        }
        .secondary-button:hover {
          background: #444;
        }
      }

      .setup-box {
        background: #fff8e1;
        border: 1px solid #ffe082;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        line-height: 1.6;
      }
      .setup-box strong {
        display: block;
        margin-bottom: 4px;
      }
      .setup-box ol {
        padding-left: 16px;
        margin: 6px 0;
      }
      @media (prefers-color-scheme: dark) {
        .setup-box {
          background: #2a2500;
          border-color: #665500;
          color: #f0f0f0;
        }
      }
    </style>
  </head>
  <body>
    <h2>MC* - Markdown Copy</h2>
    <button class="main-button" id="copyButton">Copy page Title and URL</button>
    <hr />
    <div id="content"></div>
    <hr />
    <div id="setup" style="display: none; margin-top: 12px">
      <div class="setup-box">
        <strong>No shortcut set</strong>
        <p>To enable the copy shortcut:</p>
        <ol>
          <li>Click the button below</li>
          <li>Find "MC* - Markdown Copy"</li>
          <li>
            Click the box next to "Copy page as markdown link" and press your
            shortcut
          </li>
        </ol>
        <button class="secondary-button" id="shortcutButton">⌨ Set Shortcut</button>
      </div>
    </div>
    <button class="secondary-button" id="settingsButton">⚙ Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
