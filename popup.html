<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 260px;
        padding: 16px;
        background: #fff;
        color: #111;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #f0f0f0;
        }
        .error-box {
          background: #3a1a1a;
          border-color: #7a2a2a;
        }
        .no-error {
          color: #aaa;
        }
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      .error-box {
        background: #fdecea;
        border: 1px solid #f5c2c2;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        color: #c00;
        line-height: 1.4;
      }
      .no-error {
        font-size: 13px;
        color: #888;
      }
      .clear-btn {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #eee;
        font-size: 13px;
        cursor: pointer;
      }
      #content {
        padding-bottom: 10px;
      }
      .clear-btn:hover {
        background: #ddd;
      }
      @media (prefers-color-scheme: dark) {
        .clear-btn {
          background: #333;
          color: #f0f0f0;
        }
        .clear-btn:hover {
          background: #444;
        }
      }
      .settings-btn {
        margin-top: 8px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: none;
        font-size: 13px;
        cursor: pointer;
        color: #555;
        text-align: left;
      }
      .settings-btn:hover {
        background: #f0f0f0;
      }
      @media (prefers-color-scheme: dark) {
        .settings-btn {
          color: #aaa;
        }
        .settings-btn:hover {
          background: #2a2a2a;
        }
      }
    </style>
  </head>
  <body>
    <h2>Copy as Markdown</h2>
    <div id="content"></div>
    <hr />
    <button class="settings-btn" id="settingsBtn">⚙ Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
